name: Finoraax CI & E2E Testing Suite (Appium & Selenium)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js (Appium Environment)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium Server & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2 || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies (Selenium & Appium Client)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome & ChromeDriver for Selenium Headless Testing
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Start Appium Server in Background
        run: |
          appium --log-level info > appium.log 2>&1 &
          sleep 5

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Run Kotlin Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Run 300 Selenium Web Test Cases
        run: python -m pytest tests/test_selenium_suite.py -v || true

      - name: Run 300 Appium Mobile Test Cases
        run: python -m pytest tests/test_appium_suite.py -v || true

      - name: Run E2E Integration Pipeline & Generate Excel Report
        run: python run_e2e_tests.py

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Report-Finoraax
          path: E2E_Test_Report_Finoraax.xlsx
